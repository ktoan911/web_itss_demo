services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/taskflow
      JWT_SECRET: docker-dev-secret-change-me
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:8080
      BCRYPT_COST: 10
    expose:
      - "4000"
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  mongo_data:
